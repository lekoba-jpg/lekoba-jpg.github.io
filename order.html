<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Order Medicine | 24-Hour Clinic</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Place Your Order</h1>
  </header>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="order.html">Order</a>
    <a href="#">Login</a>
  </nav>
  <div class="container">
    <div class="section">
      <h2>Upload Prescription</h2>
      <input type="file" />
    </div>
    <div class="section">
      <h2>Select Medication</h2>
      <label for="medicine">Choose from available items:</label>
      <select id="medicine"></select>
      <div id="stockStatus" class="stock-message"></div>
    </div>
    <div class="section">
      <h2>Delivery Details</h2>
      <input type="text" placeholder="Enter Delivery Address" />
      <button onclick="placeOrder()">Confirm Order</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
